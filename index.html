<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="container">
        <h1>To-Do List</h1>

        <div class="add-task">
            <input type="text" id="new-task" placeholder="Add a new task..." autocomplete="off">
            <button id="add-btn"><i class="fas fa-plus"></i> Add</button>
        </div>

        <div class="datatime-inputs">
            <input type="date" id="task-date" class="date-input">
            <input type="time" id="task-time" class="time-input">
        </div>

        <div class="priority-selector-container">
            <div class="priority-selector" id="priority-selector">
                <span class="priority-label">Priority</span>
                <div class="priority-options">
                    <span class="priority-option" data-priority="low">Low</span>
                    <span class="priority-option active" data-priority="medium">Medium</span>
                    <span class="priority-option" data-priority="high">High</span>
                    <div class="priority-slider" id="priority-slider"></div>
                </div>
            </div>
        </div>

        <div class="task-stats">
            <div id="total-tasks">0 tasks</div>
            <div id="completed-tasks">0 completed</div>
        </div>

        <div class="task-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="task-list" id="task-list">
            <div class="empty-state">
                <i class="fas fa-tasks"></i>
                <h3>No tasks yet!</h3>
                <p>Add your first task to get started!</p>
            </div>
        </div>
    </div>
    <script src="script.js">

    </script>
</body>

</html>
